name: OpenOpal

options:
  bundleIdPrefix: sh.alistair
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ARCHS: arm64
    ENABLE_HARDENED_RUNTIME: YES
    # Ad-hoc signing: enough to BUILD the system extension into the bundle.
    # Actually LOADING it requires a real team identity (or sysext developer
    # mode); switch CODE_SIGN_IDENTITY + DEVELOPMENT_TEAM when the user's
    # Developer ID is wired up.
    # Real Developer ID signing. The system-extension entitlement is restricted:
    # AMFI refuses to launch an ad-hoc binary carrying it, so the virtual camera
    # only works with a genuine team identity. Signed post-build by
    # scripts/sign.sh, which handles the inside-out ordering (extension and
    # dylibs before the app) that codesign requires.
    DEVELOPMENT_TEAM: RD994J874S
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  OpenOpal:
    type: application
    platform: macOS
    sources:
      - path: Sources/OpenOpal
      # Compiled Core ML model, fetched by scripts/fetch-models.sh (gitignored —
      # 50MB, and it's a redistributable upstream artifact).
      - path: Models/DepthAnythingV2SmallF16.mlmodelc
        type: folder
        buildPhase: resources
        optional: true
      - path: Assets/AppIcon.icns
        buildPhase: resources
    info:
      path: Sources/OpenOpal/Info.plist
      properties:
        CFBundleName: Open Opal
        CFBundleDisplayName: Open Opal
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "Open source. Not affiliated with Opal Camera Inc."
        # We drive the C1 over raw USB rather than as a capture device, so we
        # don't need NSCameraUsageDescription for the camera itself — but the
        # preview and any future AVFoundation fallback do.
        NSCameraUsageDescription: "Open Opal needs access to your Opal C1 camera."
        # Belongs on the APP (which requests the install), not the extension.
        NSSystemExtensionUsageDescription: "Open Opal installs a virtual camera so other apps can use your processed video."
        LSApplicationCategoryType: public.app-category.video
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    entitlements:
      path: Sources/OpenOpal/OpenOpal.entitlements
      properties:
        # The sandbox blocks the raw USB access depthai needs. Disabled for now;
        # revisit if we ever want to ship on the Mac App Store (which would mean
        # moving USB into a separate helper).
        com.apple.security.app-sandbox: false
        com.apple.security.device.usb: true
        com.apple.security.device.camera: true
        com.apple.developer.system-extension.install: true
        # Xcode normally injects these from the provisioning profile. Signing
        # post-build bypasses that, and without application-identifier the system
        # cannot associate the app with its team+bundle-ID pair — so it finds no
        # extensions belonging to us and reports the misleading
        # "extensionNotFound". OBS's app carries exactly these two.
        com.apple.application-identifier: RD994J874S.sh.alistair.open-opal
        com.apple.developer.team-identifier: RD994J874S
        com.apple.security.application-groups:
          - group.sh.alistair.open-opal
    dependencies:
      - target: OpenOpalCameraExtension
        embed: true
        codeSign: true
      - framework: build/bridge/libOpalBridge.dylib
        embed: true
        codeSign: true
      - framework: vendor/install/lib/libdepthai-core.dylib
        embed: true
        codeSign: true
      - framework: vendor/install/lib/libusb-1.0.dylib
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.alistair.open-opal
        SWIFT_OBJC_BRIDGING_HEADER: Sources/OpenOpal/OpenOpal-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Sources/OpalBridge/include
        # These are plain dylibs, not frameworks. XcodeGen emits -l for them but
        # files their location under FRAMEWORK_SEARCH_PATHS, so the linker never
        # finds them without this.
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/build/bridge
          - $(SRCROOT)/vendor/install/lib
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        # SwiftUI + Metal + Vision; the bridge brings depthai in transitively.
        OTHER_LDFLAGS:
          - -Wl,-rpath,@executable_path/../Frameworks
    preBuildScripts:
      - name: Build OpalBridge (depthai)
        script: |
          set -e
          if [ ! -f "$SRCROOT/vendor/install/lib/libdepthai-core.dylib" ]; then
            echo "error: depthai-core not built. Run ./scripts/bootstrap.sh first."
            exit 1
          fi
          export CMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake -S "$SRCROOT/Sources/OpalBridge" -B "$SRCROOT/build/bridge" \
                -G Ninja -DCMAKE_BUILD_TYPE=Release >/dev/null
          cmake --build "$SRCROOT/build/bridge"
        basedOnDependencyAnalysis: false

  OpenOpalCameraExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Sources/OpenOpalCameraExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.alistair.open-opal.camera
        # The bundle must be NAMED after its identifier — Xcode's system
        # extension template does exactly this (PRODUCT_NAME =
        # $(PRODUCT_BUNDLE_IDENTIFIER)), and OBS ships
        # "com.obsproject...camera-extension.systemextension". The framework's
        # lookup matches on the bundle filename, so a bundle called
        # "OpenOpalCameraExtension.systemextension" is invisible to it and comes
        # back as extensionNotFound — even though the identifier inside is right.
        PRODUCT_NAME: sh.alistair.open-opal.camera
        SWIFT_VERSION: "6.0"
    info:
      path: Sources/OpenOpalCameraExtension/Info.plist
      properties:
        CFBundleDisplayName: Open Opal Camera
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # SYSX marks this bundle as a system extension. Without it, macOS scans
        # Contents/Library/SystemExtensions, fails to recognise the bundle, and
        # reports "Extension not found in App bundle" even though it's right there.
        CFBundlePackageType: SYSX
        NSSystemExtensionUsageDescription: Provides the Open Opal virtual camera that other apps can use.
        CMIOExtension:
          # Team prefix hardcoded: $(TeamIdentifierPrefix) expands to nothing
          # because the build itself is unsigned (signing happens post-build in
          # scripts/sign.sh), and a Mach service name without the team prefix
          # never matches.
          CMIOExtensionMachServiceName: group.sh.alistair.open-opal.camera
    entitlements:
      path: Sources/OpenOpalCameraExtension/OpenOpalCameraExtension.entitlements
      properties:
        # CMIO extensions run sandboxed, no exceptions.
        com.apple.security.app-sandbox: true
        com.apple.application-identifier: RD994J874S.sh.alistair.open-opal.camera
        com.apple.developer.team-identifier: RD994J874S
        # THE fix. CMIO validation rejects the extension outright unless its
        # Mach service name is prefixed by one of the App Groups it declares:
        #   "invalid mach service name ... must be prefixed with one of the App
        #    Groups in the entitlement"
        # A bare team-ID prefix is not enough.
        com.apple.security.application-groups:
          - group.sh.alistair.open-opal
